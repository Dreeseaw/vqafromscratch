<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="doc-page">
  <main class="doc-wrap doc-shell">
    <div class="doc-head">
      <div class="doc-copy">
        <strong id="docTitle">Markdown</strong>
        <div id="docMeta" class="muted mono"></div>
      </div>
      <div class="doc-actions">
        <a id="docDownload" href="#" download>Download Markdown</a>
        <a id="docHome" href="/" target="_blank" rel="noopener">Open Dashboard</a>
      </div>
    </div>
    <div id="docBody" class="muted mono">Loading...</div>
  </main>
  <script type="module" src="/doc.js"></script>
</body>
</html>
