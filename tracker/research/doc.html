<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .doc-wrap {
      width: min(1000px, 95vw);
      margin: 16px auto 30px;
      background: #fff;
      border: 1px solid #e5e8ef;
      border-radius: 8px;
      padding: 12px;
    }
    .doc-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    #docMeta {
      margin-top: 4px;
    }
    #docBody {
      min-height: 120px;
    }
  </style>
</head>
<body>
  <main class="doc-wrap">
    <div class="doc-head">
      <div>
        <strong id="docTitle">Markdown</strong>
        <div id="docMeta" class="muted mono"></div>
      </div>
      <a id="docHome" href="/" target="_blank" rel="noopener">Open Dashboard</a>
    </div>
    <div id="docBody" class="muted mono">Loading...</div>
  </main>
  <script type="module" src="/doc.js"></script>
</body>
</html>
